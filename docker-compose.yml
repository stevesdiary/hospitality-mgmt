version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hospitality_mgmt_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hospitality_mgmt_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Express API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_DIALECT: postgres
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3360:3360"
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3360/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── React Client (Nginx) ─────────────────────────────────────────────────────
  client:
    build:
      context: ./CLIENT
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - external

volumes:
  postgres_data:

networks:
  internal:
    # API ↔ DB traffic, not exposed outside Docker
  external:
    # Client ↔ API and public traffic
